<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Browser - Component Detection Test</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .app { max-width: 800px; margin: 0 auto; padding: 24px; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 32px; border-radius: 16px; margin-bottom: 24px; }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #333; margin-bottom: 8px; }
    .card p { color: #666; font-size: 14px; line-height: 1.6; }
    .button { display: inline-block; padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-right: 8px; margin-top: 12px; }
    .button-primary { background: #667eea; color: white; }
    .button-secondary { background: #e2e8f0; color: #4a5568; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; margin-right: 6px; }
    .badge-blue { background: #ebf4ff; color: #4299e1; }
    .badge-green { background: #f0fff4; color: #48bb78; }
    .badge-red { background: #fff5f5; color: #fc8181; }
    .user-list { display: flex; gap: 16px; flex-wrap: wrap; }
    .user-card { flex: 1; min-width: 200px; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: #667eea; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; margin-bottom: 12px; }
    .nav { display: flex; gap: 16px; margin-bottom: 24px; }
    .nav a { color: #667eea; text-decoration: none; font-weight: 500; padding: 8px 0; border-bottom: 2px solid transparent; }
    .nav a.active { border-bottom-color: #667eea; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-card .number { font-size: 32px; font-weight: 700; color: #667eea; }
    .stat-card .label { font-size: 12px; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ── Components ──────────────────────────────────────

    function Badge({ label, variant = 'blue' }) {
      return <span className={`badge badge-${variant}`}>{label}</span>;
    }

    function Button({ children, variant = 'primary', onClick }) {
      return (
        <button className={`button button-${variant}`} onClick={onClick}>
          {children}
        </button>
      );
    }

    function StatCard({ number, label }) {
      return (
        <div className="stat-card">
          <div className="number">{number}</div>
          <div className="label">{label}</div>
        </div>
      );
    }

    function Header({ title, subtitle }) {
      return (
        <div className="header">
          <h1>{title}</h1>
          <p>{subtitle}</p>
        </div>
      );
    }

    function Navigation({ items, active }) {
      return (
        <nav className="nav">
          {items.map(item => (
            <a key={item} href="#" className={item === active ? 'active' : ''}>
              {item}
            </a>
          ))}
        </nav>
      );
    }

    function UserCard({ name, role, status }) {
      const initials = name.split(' ').map(n => n[0]).join('');
      return (
        <div className="card user-card">
          <div className="avatar">{initials}</div>
          <h3>{name}</h3>
          <p>{role}</p>
          <Badge label={status} variant={status === 'Active' ? 'green' : 'red'} />
        </div>
      );
    }

    function FeatureCard({ title, description, tags }) {
      return (
        <div className="card">
          <h3>{title}</h3>
          <p>{description}</p>
          <div style={{ marginTop: 12 }}>
            {tags.map(tag => <Badge key={tag} label={tag} />)}
          </div>
          <div>
            <Button variant="primary">Learn More</Button>
            <Button variant="secondary">Dismiss</Button>
          </div>
        </div>
      );
    }

    function Dashboard() {
      return (
        <div className="app">
          <Header
            title="Claude Browser Test"
            subtitle="Component detection & source mapping demo"
          />
          <Navigation
            items={['Dashboard', 'Components', 'Settings']}
            active="Dashboard"
          />
          <div className="stats">
            <StatCard number="13" label="MCP Tools" />
            <StatCard number="3" label="Frameworks" />
            <StatCard number="9" label="Tests Passed" />
          </div>
          <FeatureCard
            title="Element Selection"
            description="Click any element in the browser to inspect its component name, source file, props, and computed styles."
            tags={['React', 'Vue', 'Svelte']}
          />
          <FeatureCard
            title="Network Monitoring"
            description="Capture and analyze network requests, including failed requests and response timing."
            tags={['XHR', 'Fetch', 'WebSocket']}
          />
          <div className="user-list">
            <UserCard name="Alice Kim" role="Frontend Developer" status="Active" />
            <UserCard name="Bob Park" role="Backend Engineer" status="Active" />
            <UserCard name="Charlie Lee" role="Designer" status="Inactive" />
          </div>
        </div>
      );
    }

    // ── Render ──────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);

    console.log('React app mounted with component detection test');
    console.warn('This is a sample warning for console monitoring test');
  </script>
</body>
</html>
